name: Build, SonarCloud scan, Trivy scan, and publish to JFrog

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
  SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}

  VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
  VAULT_ROLE_ID: ${{ secrets.VAULT_ROLE_ID }}
  VAULT_SECRET_ID: ${{ secrets.VAULT_SECRET_ID }}
  VAULT_JFROG_PATH: secrets/creds/jfrog

  JFROG_ARTIFACTORY_URL: ${{ secrets.JFROG_ARTIFACTORY_URL }}
  JFROG_REPO: libs-release-local

jobs:
  build-and-sonar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar

      - name: Build and analyze with SonarCloud
        run: |
          mvn -B clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=${SONAR_PROJECT_KEY} \
            -Dsonar.organization=${SONAR_ORGANIZATION} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${SONAR_TOKEN} \
            -Dsonar.branch.name=main

      - name: Upload jar for next jobs
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  trivy-scan:
    needs: build-and-sonar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 0

  publish-to-jfrog:
    needs: trivy-scan
    runs-on: ubuntu-latest

    steps:
      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      - name: Get JFrog credentials from Vault
        run: |
          set -e

          VAULT_RESPONSE=$(curl -sf -X POST "${VAULT_ADDR}/v1/auth/approle/login" \
            -d "{\"role_id\":\"${VAULT_ROLE_ID}\",\"secret_id\":\"${VAULT_SECRET_ID}\"}")

          VAULT_TOKEN=$(echo "${VAULT_RESPONSE}" | jq -r .auth.client_token)

          if [ -z "${VAULT_TOKEN}" ] || [ "${VAULT_TOKEN}" = "null" ]; then
            echo "ERROR: Vault authentication failed"
            exit 1
          fi

          echo "::add-mask::${VAULT_TOKEN}"

          JFROG_CREDS=$(curl -sf -H "X-Vault-Token: ${VAULT_TOKEN}" \
            "${VAULT_ADDR}/v1/${VAULT_JFROG_PATH}")

          JFROG_USERNAME=$(echo "${JFROG_CREDS}" | jq -r .data.username)
          JFROG_PASSWORD=$(echo "${JFROG_CREDS}" | jq -r .data.password)

          if [ -z "${JFROG_USERNAME}" ] || [ "${JFROG_USERNAME}" = "null" ]; then
            echo "ERROR: Failed to get JFrog username from Vault"
            exit 1
          fi

          echo "::add-mask::${JFROG_PASSWORD}"
          echo "JFROG_USERNAME=${JFROG_USERNAME}" >> "$GITHUB_ENV"
          echo "JFROG_PASSWORD=${JFROG_PASSWORD}" >> "$GITHUB_ENV"

      - name: Publish jar to JFrog Artifactory
        run: |
          set -e

          ls -lah target

          JAR_FILE=$(ls target/*.jar | grep -v -E 'sources|javadoc' | head -1)

          if [ -z "$JAR_FILE" ]; then
            echo "ERROR: No jar file found"
            exit 1
          fi

          REPO_NAME="${{ github.event.repository.name }}"
          RUN_NUMBER="${{ github.run_number }}"
          ARTIFACT_NAME="${REPO_NAME}-${RUN_NUMBER}.jar"

          echo "Uploading ${JAR_FILE} to JFrog..."

          curl -fS -u "${JFROG_USERNAME}:${JFROG_PASSWORD}" \
            -T "${JAR_FILE}" \
            "${JFROG_ARTIFACTORY_URL}/${JFROG_REPO}/${REPO_NAME}/${RUN_NUMBER}/${ARTIFACT_NAME}"

          echo "Uploaded to:"
          echo "${JFROG_ARTIFACTORY_URL}/${JFROG_REPO}/${REPO_NAME}/${RUN_NUMBER}/${ARTIFACT_NAME}"