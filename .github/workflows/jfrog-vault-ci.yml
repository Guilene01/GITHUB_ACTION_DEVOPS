name: Build, SonarCloud scan, and publish to JFrog

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history required for SonarCloud blame data

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar

      - name: Build and analyze with SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${SONAR_TOKEN}

      - name: Select build jar
        id: jarcheck
        run: |
          JAR_FILE=$(ls target/*.jar 2>/dev/null | grep -v -E 'sources|javadoc' | head -1)
          if [ -z "${JAR_FILE}" ]; then
            echo "ERROR: no build jar found in target/ (build may have failed or skipped packaging)"
            exit 1
          fi
          echo "jar_path=${JAR_FILE}" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: ${{ steps.jarcheck.outputs.jar_path }}

  trivy-scan:
    needs: build-and-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 0

  validate-vault:
    needs: trivy-scan
    runs-on: ubuntu-latest
    outputs:
      jfrog_username: ${{ steps.vault.outputs.username }}
    steps:
      - name: Authenticate and fetch JFrog credentials from Vault
        id: vault
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_ROLE_ID: ${{ secrets.VAULT_ROLE_ID }}
          VAULT_SECRET_ID: ${{ secrets.VAULT_SECRET_ID }}
        run: |
          set -o pipefail

          VAULT_RESPONSE=$(curl -sf -X POST "${VAULT_ADDR}/v1/auth/approle/login" \
            -d "{\"role_id\":\"${VAULT_ROLE_ID}\",\"secret_id\":\"${VAULT_SECRET_ID}\"}") || {
            echo "ERROR: Vault AppRole login request failed (network/HTTP error)"; exit 1; }

          VAULT_TOKEN=$(echo "${VAULT_RESPONSE}" | jq -r .auth.client_token)
          if [ -z "${VAULT_TOKEN}" ] || [ "${VAULT_TOKEN}" = "null" ]; then
            echo "ERROR: Vault AppRole authentication failed — check VAULT_ADDR, VAULT_ROLE_ID, VAULT_SECRET_ID secrets"
            exit 1
          fi
          echo "::add-mask::${VAULT_TOKEN}"
          echo "Vault AppRole authentication: OK"

          JFROG_CREDS=$(curl -sf -H "X-Vault-Token: ${VAULT_TOKEN}" \
            "${VAULT_ADDR}/v1/secrets/creds/jfrog") || {
            echo "ERROR: Vault request to secrets/creds/jfrog failed (network/HTTP error)"; exit 1; }

          JFROG_USERNAME=$(echo "${JFROG_CREDS}" | jq -r .data.username)
          JFROG_PASSWORD=$(echo "${JFROG_CREDS}" | jq -r .data.password)
          if [ -z "${JFROG_USERNAME}" ] || [ "${JFROG_USERNAME}" = "null" ]; then
            echo "ERROR: Failed to fetch JFrog credentials from Vault path secrets/creds/jfrog"
            exit 1
          fi
          echo "::add-mask::${JFROG_PASSWORD}"
          echo "Vault secret path: OK"

          echo "username=${JFROG_USERNAME}" >> "$GITHUB_OUTPUT"
          echo "JFROG_USERNAME=${JFROG_USERNAME}" >> "$GITHUB_ENV"
          echo "JFROG_PASSWORD=${JFROG_PASSWORD}" >> "$GITHUB_ENV"

  publish-to-jfrog:
    needs: validate-vault
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      - name: Re-authenticate to Vault for JFrog credentials
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_ROLE_ID: ${{ secrets.VAULT_ROLE_ID }}
          VAULT_SECRET_ID: ${{ secrets.VAULT_SECRET_ID }}
        run: |
          set -o pipefail

          VAULT_RESPONSE=$(curl -sf -X POST "${VAULT_ADDR}/v1/auth/approle/login" \
            -d "{\"role_id\":\"${VAULT_ROLE_ID}\",\"secret_id\":\"${VAULT_SECRET_ID}\"}") || {
            echo "ERROR: Vault AppRole login request failed"; exit 1; }

          VAULT_TOKEN=$(echo "${VAULT_RESPONSE}" | jq -r .auth.client_token)
          if [ -z "${VAULT_TOKEN}" ] || [ "${VAULT_TOKEN}" = "null" ]; then
            echo "ERROR: Vault AppRole authentication failed"
            exit 1
          fi
          echo "::add-mask::${VAULT_TOKEN}"

          JFROG_CREDS=$(curl -sf -H "X-Vault-Token: ${VAULT_TOKEN}" \
            "${VAULT_ADDR}/v1/secrets/creds/jfrog") || {
            echo "ERROR: Vault request to secrets/creds/jfrog failed"; exit 1; }

          JFROG_USERNAME=$(echo "${JFROG_CREDS}" | jq -r .data.username)
          JFROG_PASSWORD=$(echo "${JFROG_CREDS}" | jq -r .data.password)
          if [ -z "${JFROG_USERNAME}" ] || [ "${JFROG_USERNAME}" = "null" ]; then
            echo "ERROR: Failed to fetch JFrog credentials from Vault"
            exit 1
          fi
          echo "::add-mask::${JFROG_PASSWORD}"

          echo "JFROG_USERNAME=${JFROG_USERNAME}" >> "$GITHUB_ENV"
          echo "JFROG_PASSWORD=${JFROG_PASSWORD}" >> "$GITHUB_ENV"

      - name: Publish artifact to JFrog
        env:
          JFROG_URL: ${{ secrets.JFROG_URL }}
        run: |
          JAR_FILE=$(ls target/*.jar | grep -v -E 'sources|javadoc' | head -1)
          REPO_NAME="${{ github.event.repository.name }}"
          curl -sf -u "${JFROG_USERNAME}:${JFROG_PASSWORD}" \
            -T "${JAR_FILE}" \
            "${JFROG_URL}/artifactory/libs-release-local/${REPO_NAME}/${{ github.run_number }}/${REPO_NAME}-${{ github.run_number }}.jar"