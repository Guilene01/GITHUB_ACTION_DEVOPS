name: Build, SonarCloud scan, and publish to JFrog

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history required for SonarCloud blame data

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar

      - name: Build and analyze with SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${SONAR_TOKEN}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  publish-to-jfrog:
    needs: build-and-scan
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      - name: Fetch JFrog credentials from Vault
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_ROLE_ID: ${{ secrets.VAULT_ROLE_ID }}
          VAULT_SECRET_ID: ${{ secrets.VAULT_SECRET_ID }}
        run: |
          VAULT_TOKEN=$(curl -sf -X POST "${VAULT_ADDR}/v1/auth/approle/login" \
            -d "{\"role_id\":\"${VAULT_ROLE_ID}\",\"secret_id\":\"${VAULT_SECRET_ID}\"}" \
            | jq -r .auth.client_token)
          echo "::add-mask::${VAULT_TOKEN}"

          JFROG_CREDS=$(curl -sf -H "X-Vault-Token: ${VAULT_TOKEN}" \
            "${VAULT_ADDR}/v1/secrets/creds/jfrog" | jq -r .data)

          JFROG_USERNAME=$(echo "${JFROG_CREDS}" | jq -r .username)
          JFROG_PASSWORD=$(echo "${JFROG_CREDS}" | jq -r .password)
          echo "::add-mask::${JFROG_PASSWORD}"

          echo "JFROG_USERNAME=${JFROG_USERNAME}" >> "$GITHUB_ENV"
          echo "JFROG_PASSWORD=${JFROG_PASSWORD}" >> "$GITHUB_ENV"

      - name: Publish artifact to JFrog
        env:
          JFROG_URL: ${{ secrets.JFROG_URL }}
        run: |
          curl -u "${JFROG_USERNAME}:${JFROG_PASSWORD}" \
            -T target/*.jar \
            "${JFROG_URL}/artifactory/libs-release-local/${{ github.repository }}-${{ github.run_number }}.jar"

  validate-vault:
    needs: build-and-scan
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate and verify Vault secret path
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_ROLE_ID: ${{ secrets.VAULT_ROLE_ID }}
          VAULT_SECRET_ID: ${{ secrets.VAULT_SECRET_ID }}
        run: |
          VAULT_TOKEN=$(curl -sf -X POST "${VAULT_ADDR}/v1/auth/approle/login" \
            -d "{\"role_id\":\"${VAULT_ROLE_ID}\",\"secret_id\":\"${VAULT_SECRET_ID}\"}" \
            | jq -r .auth.client_token)
          echo "::add-mask::${VAULT_TOKEN}"
          echo "Vault AppRole authentication: OK"

          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            -H "X-Vault-Token: ${VAULT_TOKEN}" \
            "${VAULT_ADDR}/v1/secrets/creds/jfrog")
          echo "secrets/creds/jfrog HTTP status: ${STATUS}"
          [ "${STATUS}" = "200" ] && echo "Vault secret path: OK" || (echo "Vault secret path: FAILED" && exit 1)
