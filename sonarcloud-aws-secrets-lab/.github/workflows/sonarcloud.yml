name: SonarCloud Scan

on:
  push:
    branches: [main]
  pull_request:

# Required so this workflow can request a token to log in to AWS via OIDC.
permissions:
  id-token: write
  contents: read

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # SonarCloud needs full git history for blame info

      - name: Log in to AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get SonarCloud token from AWS Secrets Manager
        run: |
          SONAR_TOKEN=$(aws secretsmanager get-secret-value \
            --secret-id sonarcloud/token \
            --query SecretString --output text | jq -r .SONAR_TOKEN)
          echo "::add-mask::${SONAR_TOKEN}"
          echo "SONAR_TOKEN=${SONAR_TOKEN}" >> "$GITHUB_ENV"

      - name: Run SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
